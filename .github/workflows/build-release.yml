name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[all]"

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed `
            --name "GitBook-Downloader" `
            --hidden-import customtkinter `
            --hidden-import tkinter `
            --hidden-import markdownify `
            --hidden-import bs4 `
            --hidden-import lxml `
            --hidden-import requests `
            --add-data "src/gitbook_downloader;gitbook_downloader" `
            --clean --noconfirm `
            src/gitbook_downloader/dashboard.py

      - name: Package release
        run: |
          mkdir release
          copy dist\GitBook-Downloader.exe release\
          copy README.md release\
          copy CHANGELOG.md release\
          Compress-Archive -Path release\* -DestinationPath GitBook-Downloader-v${{ github.ref_name }}.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: GitBook-Downloader-v${{ github.ref_name }}.zip
          generate_release_notes: true
